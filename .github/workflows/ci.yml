name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer 2>/dev/null || true
      - name: Build
        run: swift build 2>&1
      - name: Run tests
        run: swift test 2>&1

  build-linux:
    name: Build (Linux - logic only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build portable modules
        run: |
          # Only compile files that don't depend on macOS frameworks
          echo "Linux build skipped — macOS-only app"
